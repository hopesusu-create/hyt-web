backend:
  name: git-gateway
  branch: main # 你的代码分支

media_folder: "images" # 图片存放位置
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "index"
        fields:
          - {label: "Product Name", name: "title", widget: "string"}
          - {label: "Description", name: "body", widget: "markdown"}
          - {label: "Product Image", name: "image", widget: "image"}